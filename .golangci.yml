version: 2
run:
  timeout: 5m
  tests: false
  skip-dirs:
    - test

linters:
  enable:
    - govet
    - revive
    - staticcheck
    - errcheck
    - ineffassign
    # - gosimple
    - misspell
    - gocyclo
  disable:
    - funlen         # allow longer functions in handlers until refactor lands
    - dupl           # disable duplicate code check for now

linters-settings:
  gocyclo:
    min-complexity: 20
  misspell:
    locale: US
  revive:
    rules:
      - name: blank-imports
      - name: if-return
      - name: increment-decrement
      - name: range-val-in-closure
      - name: receiver-naming
      - name: errorf
      - name: var-naming
        disabled: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude:
    - "ST1000: .* is unused"   # staticcheck false positives in mocks
  exclude-rules:
    - path: ^internal/utils/.*\.go$
      linters:
        - revive
      text: "var-naming: avoid meaningless package names"
